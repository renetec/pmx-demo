<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PMX Demo Client</title>
  <style>
    :root {
      --paper: #f7f2ea;
      --panel: rgba(255, 252, 246, 0.95);
      --ink: #201a14;
      --muted: #70675d;
      --accent: #0d7c66;
      --gold: #d1a441;
      --line: rgba(72, 56, 37, 0.14);
      --shadow: 0 24px 70px rgba(50, 34, 16, 0.14);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(13, 124, 102, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(209, 164, 65, 0.17), transparent 34%),
        linear-gradient(135deg, #f8f3ea, #eee4d5 58%, #e7dbca);
    }

    .shell {
      display: grid;
      grid-template-columns: 430px 1fr;
      gap: 20px;
      min-height: 100vh;
      padding: 18px;
    }

    .panel, .stage {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .panel {
      display: flex;
      flex-direction: column;
    }

    .panel-head {
      padding: 24px 24px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0));
    }

    .eyebrow {
      margin-bottom: 10px;
      color: var(--accent);
      font: 700 12px/1.2 "Courier New", monospace;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.04;
    }

    .summary {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .panel-body {
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow: auto;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(209, 164, 65, 0.17);
      color: #93660f;
      font: 700 12px/1.2 "Courier New", monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .box {
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.55);
    }

    .box-label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font: 700 11px/1.2 "Courier New", monospace;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .box-value {
      font: 700 15px/1.4 "Courier New", monospace;
      word-break: break-word;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 11px 16px;
      cursor: pointer;
      color: #fffdfa;
      background: var(--ink);
      font: 700 13px/1.2 "Courier New", monospace;
      letter-spacing: 0.04em;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button.secondary {
      background: transparent;
      color: var(--ink);
      border-color: var(--line);
    }

    button:hover { transform: translateY(-1px); }

    .section h2 {
      margin: 0 0 10px;
      font-size: 17px;
      line-height: 1.2;
    }

    .section p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .section ul {
      margin: 10px 0 0;
      padding-left: 18px;
      font-size: 15px;
      line-height: 1.5;
    }

    .section li + li { margin-top: 6px; }

    .footnote {
      padding-top: 10px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .stage {
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
    }

    .stage-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(255,255,255,0.45), rgba(255,255,255,0));
    }

    .stage-meta {
      min-width: 0;
    }

    .stage-title {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.1;
    }

    .stage-subtitle {
      color: var(--muted);
      font: 700 12px/1.3 "Courier New", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stage-body {
      display: grid;
      place-items: center;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(255,255,255,0));
    }

    .frame {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff;
    }

    @media (max-width: 1100px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 72vh;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel">
      <div class="panel-head">
        <div class="eyebrow">Standalone Client Demo</div>
        <h1 id="slide-title">PMX Demo</h1>
        <p class="summary" id="slide-summary"></p>
      </div>
      <div class="panel-body">
        <div class="badge" id="slide-index">Étape 1 / 1</div>

        <div class="box">
          <span class="box-label">Écran représenté</span>
          <div class="box-value" id="slide-route"></div>
        </div>

        <div class="buttons">
          <button id="prev-btn" class="secondary">← Précédent</button>
          <button id="next-btn">Suivant →</button>
        </div>

        <section class="section">
          <h2>Ce qu’il faut montrer</h2>
          <p id="slide-goal"></p>
        </section>

        <section class="section">
          <h2>Ce qu’il faut dire</h2>
          <ul id="slide-talk"></ul>
        </section>

        <section class="section">
          <h2>Démo conseillée</h2>
          <ul id="slide-actions"></ul>
        </section>

        <div class="footnote">
          Cette version utilise uniquement des images locales dans le dossier <code>demo/assets</code>.
          Vous pouvez la déposer telle quelle sur un serveur web statique.
        </div>
      </div>
    </aside>

    <main class="stage">
      <div class="stage-head">
        <div class="stage-meta">
          <h2 class="stage-title" id="viewer-title">Chargement…</h2>
          <div class="stage-subtitle" id="viewer-subtitle"></div>
        </div>
      </div>
      <div class="stage-body">
        <div class="frame">
          <img id="slide-image" alt="Capture PMX Web">
        </div>
      </div>
    </main>
  </div>

  <script>
    const slides = [
      {
        title: "Accueil",
        summary: "Commencer par la table de matières pour montrer que la nouvelle interface reprend les grands blocs historiques de PMX.",
        route: "/fr",
        image: "assets/fr.png",
        goal: "Présenter les 7 menus majeurs et positionner l'application comme une modernisation de la logique existante.",
        talk: [
          "On retrouve la structure métier de PMX, mais dans une interface web claire.",
          "Le client peut reconnaître son univers sans rester bloqué sur XP.",
          "Chaque bloc correspond à une vraie fonction opérationnelle."
        ],
        actions: [
          "Montrer DOSSIER, FORMUL, GLIVRE, HISTOIRE, PROFIL, RAPPORT, ROUTINE.",
          "Expliquer que l'ordre suit la logique historique du système.",
          "Annoncer le parcours de démonstration."
        ]
      },
      {
        title: "DOSSIER",
        summary: "Le dossier est le coeur du système: assuré, police, charges, paiements, sinistres et factures.",
        route: "/fr/dossier",
        image: "assets/fr-dossier.png",
        goal: "Faire comprendre que PMX est centré sur le compte client plutôt que sur la facture seule.",
        talk: [
          "Le dossier regroupe l'identité, la police et l'activité financière.",
          "C'est la partie la plus fidèle à la logique COBOL.",
          "Charges et paiements s'attachent d'abord au dossier."
        ],
        actions: [
          "Montrer la liste des dossiers.",
          "Expliquer qu'un dossier ouvre ensuite les onglets métier.",
          "Insister sur le lien entre dossier, solde et activité."
        ]
      },
      {
        title: "FORMUL",
        summary: "Les formulaires regroupent les sorties métier: état de compte, facture, demande, étiquettes, impression de fichier.",
        route: "/fr/formul",
        image: "assets/fr-formul.png",
        goal: "Montrer que les anciens modules d'impression sont désormais organisés comme un vrai sous-menu web.",
        talk: [
          "Le client garde ses documents métier essentiels.",
          "On remplace les vieux écrans/formulaires par une navigation plus simple.",
          "La facture reste un résultat du workflow."
        ],
        actions: [
          "Montrer les cartes du sous-menu.",
          "Mettre l'accent sur État de compte et Facture.",
          "Préparer la transition vers la liste des factures."
        ]
      },
      {
        title: "Factures",
        summary: "La liste des factures donne un résultat visible et concret à la logique d'émission.",
        route: "/fr/factures",
        image: "assets/fr-factures.png",
        goal: "Rassurer le client sur la sortie finale: une vraie facture lisible, liée au dossier assuré.",
        talk: [
          "Même si la logique interne est dossier puis charge puis facture, l'utilisateur voit un document final clair.",
          "Le lien avec le dossier assuré est conservé.",
          "On reste compatible avec une logique d'impression ou d'export."
        ],
        actions: [
          "Montrer la liste des factures émises.",
          "Expliquer que chaque ligne renvoie au dossier.",
          "Relier ce menu au besoin comptable du client."
        ]
      },
      {
        title: "GLIVRE",
        summary: "Le grand livre est structuré comme un bloc comptable séparé avec ses propres sous-fonctions.",
        route: "/fr/glivre",
        image: "assets/fr-glivre.png",
        goal: "Montrer que la base de l'outil peut aller au-delà d'une simple interface commerciale.",
        talk: [
          "GLIVRE reprend la logique comptable du système historique.",
          "Les fonctions sont regroupées comme sous-menu et non comme écran texte.",
          "Cela prépare un futur plus robuste côté finance."
        ],
        actions: [
          "Pointer les cartes du grand livre.",
          "Expliquer que ce bloc reste volontairement séparé de l'opérationnel.",
          "Ne pas s'attarder si le client parle surtout métier."
        ]
      },
      {
        title: "HISTOIRE",
        summary: "L'historique expose la chronologie du compte client: charges d'un côté, paiements de l'autre.",
        route: "/fr/histoire",
        image: "assets/fr-histoire.png",
        goal: "Faire comprendre comment le solde se construit dans le temps.",
        talk: [
          "Cette vue rend la logique PMX beaucoup plus compréhensible.",
          "On voit d'où vient le solde: charges, paiements, agence.",
          "C'est utile pour les explications client et pour le support interne."
        ],
        actions: [
          "Montrer les sections Charges et Paiements.",
          "Relier cette vue à la notion de recevable.",
          "Rappeler que la facture n'est qu'une conséquence de l'activité."
        ]
      },
      {
        title: "PROFIL",
        summary: "Profil sert à filtrer le portefeuille par compagnie, produit, type de facturation, activité, échéance ou solde.",
        route: "/fr/profil",
        image: "assets/fr-profil.png",
        goal: "Positionner l'application comme un outil de pilotage et pas seulement de saisie.",
        talk: [
          "On peut retrouver rapidement des segments de portefeuille.",
          "Cette vue aide au suivi commercial et administratif.",
          "Elle remplace plusieurs recherches laborieuses du système historique."
        ],
        actions: [
          "Montrer les filtres disponibles.",
          "Expliquer qu'un résultat renvoie directement au dossier.",
          "Utiliser cette vue pour parler de gestion portefeuille."
        ]
      },
      {
        title: "RAPPORT",
        summary: "Les rapports regroupent échéances, rappels, recevables, sommaires et bordereaux.",
        route: "/fr/rapport",
        image: "assets/fr-rapport.png",
        goal: "Montrer la valeur de gestion: suivi des comptes, du portefeuille et des rapports métier.",
        talk: [
          "C'est ici que la partie administrative et de contrôle devient visible.",
          "Recevables et rappels seront souvent les plus importants pour la migration.",
          "Cette structure est prête à remplacer progressivement les rapports PMX les plus utilisés."
        ],
        actions: [
          "Montrer le sous-menu Rapport.",
          "Insister sur Recevables et Rappels.",
          "Présenter cela comme la couche de supervision."
        ]
      },
      {
        title: "ROUTINE",
        summary: "Routine regroupe les procédures journalières: journal de facturation, saisie de paiement et rappels.",
        route: "/fr/routine",
        image: "assets/fr-routine.png",
        goal: "Raccrocher la démonstration aux gestes quotidiens des utilisateurs PMX.",
        talk: [
          "C'est l'équivalent moderne des procédures journalières historiques.",
          "Facturation, paiement et rappel sont regroupés dans un point d'entrée simple.",
          "C'est souvent le menu le plus parlant pour les équipes internes."
        ],
        actions: [
          "Montrer les trois cartes.",
          "Expliquer que c'est le point d'entrée du travail quotidien.",
          "Introduire ensuite la saisie de paiement."
        ]
      },
      {
        title: "Paiement",
        summary: "La saisie de paiement montre la logique compte-client: le paiement agit sur le dossier avant le reçu final.",
        route: "/fr/routine/paiement",
        image: "assets/fr-routine-paiement.png",
        goal: "Illustrer la logique PMX de paiement sur compte plutôt que paiement attaché uniquement à une facture.",
        talk: [
          "Le paiement s'applique d'abord au compte client.",
          "Le reçu et le solde en découlent ensuite.",
          "C'est une des différences clés avec un logiciel de facturation plus simple."
        ],
        actions: [
          "Montrer les champs de saisie.",
          "Parler du lien entre paiement, reçu et recevable.",
          "Utiliser cet écran pour poser les bonnes questions métier au client."
        ]
      },
      {
        title: "Conclusion",
        summary: "Terminer en ramenant le client au message principal: même logique métier, meilleure expérience, base prête pour évoluer.",
        route: "/fr",
        image: "assets/fr.png",
        goal: "Laisser une image claire de modernisation plutôt qu'un simple lifting visuel.",
        talk: [
          "L'application conserve les grands blocs du métier PMX.",
          "Elle retire la dépendance à XP et clarifie les workflows.",
          "La prochaine étape est de valider précisément les flux réels du client."
        ],
        actions: [
          "Revenir à l'écran d'accueil.",
          "Récapituler les menus montrés.",
          "Demander quels blocs sont critiques pour le jour 1."
        ]
      }
    ];

    let index = 0;

    const titleEl = document.getElementById('slide-title');
    const summaryEl = document.getElementById('slide-summary');
    const indexEl = document.getElementById('slide-index');
    const routeEl = document.getElementById('slide-route');
    const goalEl = document.getElementById('slide-goal');
    const talkEl = document.getElementById('slide-talk');
    const actionsEl = document.getElementById('slide-actions');
    const imageEl = document.getElementById('slide-image');
    const viewerTitleEl = document.getElementById('viewer-title');
    const viewerSubtitleEl = document.getElementById('viewer-subtitle');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    function fillList(el, items) {
      el.innerHTML = '';
      items.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item;
        el.appendChild(li);
      });
    }

    function render() {
      const slide = slides[index];
      titleEl.textContent = slide.title;
      summaryEl.textContent = slide.summary;
      indexEl.textContent = `Étape ${index + 1} / ${slides.length}`;
      routeEl.textContent = slide.route;
      goalEl.textContent = slide.goal;
      fillList(talkEl, slide.talk);
      fillList(actionsEl, slide.actions);
      imageEl.src = slide.image;
      imageEl.alt = `${slide.title} — capture PMX`;
      viewerTitleEl.textContent = slide.title;
      viewerSubtitleEl.textContent = slide.route;
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === slides.length - 1;
      prevBtn.style.opacity = index === 0 ? 0.45 : 1;
      nextBtn.style.opacity = index === slides.length - 1 ? 0.45 : 1;
      document.title = `${slide.title} — PMX Demo Client`;
    }

    prevBtn.addEventListener('click', () => {
      if (index > 0) {
        index -= 1;
        render();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (index < slides.length - 1) {
        index += 1;
        render();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight') nextBtn.click();
      if (event.key === 'ArrowLeft') prevBtn.click();
    });

    render();
  </script>
</body>
</html>
